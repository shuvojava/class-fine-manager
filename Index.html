<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Fine Manager - JEE/CGNT-A/70/01</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #2d3748;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 35px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }

        .batch-badge {
            display: inline-block;
            background: #ebf8ff;
            color: #2b6cb0;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a202c;
            font-weight: 700;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.4);
        }

        .stats-card h3 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stats-card .total-amount {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
        }

        input {
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .btn-cancel {
            background: #a0aec0;
            color: white;
            display: none;
        }

        .btn-cancel:hover {
            background: #718096;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            text-align: left;
        }

        th {
            background-color: #f7fafc;
            color: #4a5568;
            padding: 14px 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-edit {
            background: #ebf8ff;
            color: #3182ce;
        }

        .btn-edit:hover {
            background: #bee3f8;
        }

        .btn-delete {
            background: #fed7d7;
            color: #e53e3e;
        }

        .btn-delete:hover {
            background: #feb2b2;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #a0aec0;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="batch-badge">Batch: JEE/CGNT-A/70/01</span>
        <h1>Fine Collection Fund</h1>
    </header>

    <div class="stats-card">
        <h3>Total Collection</h3>
        <div class="total-amount"><span id="totalAmount">0</span> ৳</div>
    </div>

    <form id="fineForm">
        <input type="hidden" id="editIndex" value="-1">
        
        <div class="form-grid">
            <div class="form-group">
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" placeholder="e.g., John Doe" required>
            </div>
            <div class="form-group">
                <label for="rollNo">Roll Number</label>
                <input type="number" id="rollNo" placeholder="e.g., 05" required>
            </div>
            <div class="form-group">
                <label for="reason">Reason for Fine</label>
                <input type="text" id="reason" placeholder="e.g., Late entry" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount (৳)</label>
                <input type="number" id="amount" placeholder="e.g., 50" required>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" id="submitBtn" class="btn btn-primary">Add Fine Record</button>
            <button type="button" id="cancelBtn" class="btn btn-cancel" onclick="resetForm()">Cancel Edit</button>
        </div>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Roll</th>
                    <th>Name</th>
                    <th>Reason</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="fineList">
                <!-- Dynamic Rows Go Here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let fines = JSON.parse(localStorage.getItem('batchFines')) || [];

    const fineForm = document.getElementById('fineForm');
    const studentNameInput = document.getElementById('studentName');
    const rollNoInput = document.getElementById('rollNo');
    const reasonInput = document.getElementById('reason');
    const amountInput = document.getElementById('amount');
    const editIndexInput = document.getElementById('editIndex');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const fineList = document.getElementById('fineList');
    const totalAmountEl = document.getElementById('totalAmount');

    function renderTable() {
        fineList.innerHTML = '';
        let total = 0;

        if (fines.length === 0) {
            fineList.innerHTML = `<tr><td colspan="5" class="empty-state">No fine records added yet.</td></tr>`;
            totalAmountEl.innerText = '0';
            return;
        }

        fines.forEach((fine, index) => {
            total += parseFloat(fine.amount);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>#${fine.roll}</strong></td>
                <td>${fine.name}</td>
                <td>${fine.reason}</td>
                <td><strong>${fine.amount} ৳</strong></td>
                <td>
                    <div class="actions">
                        <button class="btn-action btn-edit" onclick="editFine(${index})">Edit</button>
                        <button class="btn-action btn-delete" onclick="deleteFine(${index})">Delete</button>
                    </div>
                </td>
            `;
            fineList.appendChild(row);
        });

        totalAmountEl.innerText = total.toLocaleString();
        localStorage.setItem('batchFines', JSON.stringify(fines));
    }

    fineForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = studentNameInput.value.trim();
        const roll = rollNoInput.value.trim();
        const reason = reasonInput.value.trim();
        const amount = parseFloat(amountInput.value);
        const editIndex = parseInt(editIndexInput.value);

        if (editIndex === -1) {
            // Add new fine record
            fines.push({ name, roll, reason, amount });
        } else {
            // Update existing fine record
            fines[editIndex] = { name, roll, reason, amount };
        }

        resetForm();
        renderTable();
    });

    function editFine(index) {
        const item = fines[index];
        studentNameInput.value = item.name;
        rollNoInput.value = item.roll;
        reasonInput.value = item.reason;
        amountInput.value = item.amount;
        editIndexInput.value = index;

        submitBtn.innerText = 'Update Fine Record';
        submitBtn.style.background = '#3182ce';
        cancelBtn.style.display = 'block';
    }

    function deleteFine(index) {
        if (confirm('Are you sure you want to delete this record?')) {
            fines.splice(index, 1);
            renderTable();
            if (parseInt(editIndexInput.value) === index) {
                resetForm();
            }
        }
    }

    function resetForm() {
        fineForm.reset();
        editIndexInput.value = -1;
        submitBtn.innerText = 'Add Fine Record';
        submitBtn.style.background = '#48bb78';
        cancelBtn.style.display = 'none';
    }

    // Initial Render
    renderTable();
</script>

</body>
</html>
