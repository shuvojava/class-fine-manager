<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Fine Manager - JEE/CGNT-A/70/01</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SheetJS CDN (Excel Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- jsPDF CDN (PDF Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #2d3748;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 35px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 20px;
        }

        .batch-badge {
            display: inline-block;
            background: #ebf8ff;
            color: #2b6cb0;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a202c;
            font-weight: 700;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.4);
        }

        .stats-card h3 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stats-card .total-amount {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
        }

        input, select {
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
            background: #fff;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .btn-cancel {
            background: #a0aec0;
            color: white;
            display: none;
        }

        .btn-cancel:hover {
            background: #718096;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .sort-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .export-group {
            display: flex;
            gap: 10px;
        }

        .btn-export {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-export:hover {
            opacity: 0.9;
        }

        .btn-excel {
            background: #27ae60;
            color: white;
        }

        .btn-pdf {
            background: #e74c3c;
            color: white;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 25px 0 12px 0;
            color: #2d3748;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            text-align: left;
        }

        th {
            background-color: #f7fafc;
            color: #4a5568;
            padding: 14px 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-edit {
            background: #ebf8ff;
            color: #3182ce;
        }

        .btn-edit:hover {
            background: #bee3f8;
        }

        .btn-delete {
            background: #fed7d7;
            color: #e53e3e;
        }

        .btn-delete:hover {
            background: #feb2b2;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #a0aec0;
            font-style: italic;
        }

        .time-badge {
            font-size: 0.78rem;
            color: #718096;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <span class="batch-badge">Batch: JEE/CGNT-A/70/01</span>
        <h1>Fine Collection Fund</h1>
    </header>

    <div class="stats-card">
        <h3>Total Collection</h3>
        <div class="total-amount"><span id="totalAmount">0</span> ৳</div>
    </div>

    <form id="fineForm">
        <input type="hidden" id="editKey" value="">
        
        <div class="form-grid">
            <div class="form-group">
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" placeholder="e.g., John Doe" required>
            </div>
            <div class="form-group">
                <label for="rollNo">Roll Number</label>
                <input type="number" id="rollNo" placeholder="e.g., 05" required>
            </div>
            <div class="form-group">
                <label for="reason">Reason for Fine</label>
                <input type="text" id="reason" placeholder="e.g., Late entry" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount (৳)</label>
                <input type="number" id="amount" placeholder="e.g., 50" required>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" id="submitBtn" class="btn btn-primary">Add Fine Record</button>
            <button type="button" id="cancelBtn" class="btn btn-cancel" onclick="resetForm()">Cancel Edit</button>
        </div>
    </form>

    <!-- Controls Row (Sorting & Exporting) -->
    <div class="controls-row">
        <div class="sort-group">
            <label for="sortBy" style="margin-bottom:0;">Sort By:</label>
            <select id="sortBy">
                <option value="time-desc">Latest Entry First</option>
                <option value="time-asc">Oldest Entry First</option>
                <option value="roll-asc">Roll (Ascending 1-9)</option>
                <option value="roll-desc">Roll (Descending 9-1)</option>
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
            </select>
        </div>

        <div class="export-group">
            <button id="btnExcel" class="btn-export btn-excel">📊 Export to Excel</button>
            <button id="btnPdf" class="btn-export btn-pdf">📄 Download PDF</button>
        </div>
    </div>

    <!-- Fine History Table -->
    <h2 class="section-title">📜 Fine Log History</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Roll</th>
                    <th>Name</th>
                    <th>Reason</th>
                    <th>Amount</th>
                    <th>Date & Time</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="fineList">
                <tr><td colspan="6" class="empty-state">Loading data from database...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Per Person Total Summary Section -->
    <h2 class="section-title">👤 Per Person Fine Summary</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Roll</th>
                    <th>Student Name</th>
                    <th>Total Fine Count</th>
                    <th>Total Fine Amount (৳)</th>
                </tr>
            </thead>
            <tbody id="personSummaryList">
                <tr><td colspan="4" class="empty-state">No student summary available.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Firebase Modular SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Security PIN Code
    const SECURITY_PIN = "1234";

    // Your Web App's Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCddhLGYLMEHRMrIYBkACcomLJjkCOM9Gk",
        authDomain: "class-fine-manager.firebaseapp.com",
        databaseURL: "https://class-fine-manager-default-rtdb.firebaseio.com",
        projectId: "class-fine-manager",
        storageBucket: "class-fine-manager.firebasestorage.app",
        messagingSenderId: "4267833926",
        appId: "1:4267833926:web:d7aa73fadf0e577d646847"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const finesRef = ref(db, 'fines');

    const fineForm = document.getElementById('fineForm');
    const studentNameInput = document.getElementById('studentName');
    const rollNoInput = document.getElementById('rollNo');
    const reasonInput = document.getElementById('reason');
    const amountInput = document.getElementById('amount');
    const editKeyInput = document.getElementById('editKey');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const fineList = document.getElementById('fineList');
    const personSummaryList = document.getElementById('personSummaryList');
    const totalAmountEl = document.getElementById('totalAmount');
    const sortBySelect = document.getElementById('sortBy');

    let currentFines = {};

    // Helper Function to Format Timestamp
    function formatTimestamp(timestamp) {
        if (!timestamp) return 'N/A';
        const d = new Date(timestamp);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Read Data in Realtime
    onValue(finesRef, (snapshot) => {
        const data = snapshot.val();
        currentFines = data || {};
        renderUI();
    }, (error) => {
        console.error("Firebase Error:", error);
        fineList.innerHTML = `<tr><td colspan="6" class="empty-state" style="color: red;">Database Connection Error! Please check Firebase Rules.</td></tr>`;
    });

    // Render Both Fine Table and Person Summary
    function renderUI() {
        fineList.innerHTML = '';
        personSummaryList.innerHTML = '';
        let total = 0;

        if (Object.keys(currentFines).length === 0) {
            fineList.innerHTML = `<tr><td colspan="6" class="empty-state">No fine records added yet.</td></tr>`;
            personSummaryList.innerHTML = `<tr><td colspan="4" class="empty-state">No student summary available.</td></tr>`;
            totalAmountEl.innerText = '0';
            return;
        }

        // Convert object to array for sorting
        let fineArray = Object.keys(currentFines).map(key => ({
            key: key,
            ...currentFines[key]
        }));

        // Apply Sorting
        const sortType = sortBySelect.value;
        fineArray.sort((a, b) => {
            if (sortType === 'roll-asc') return parseInt(a.roll) - parseInt(b.roll);
            if (sortType === 'roll-desc') return parseInt(b.roll) - parseInt(a.roll);
            if (sortType === 'name-asc') return a.name.localeCompare(b.name);
            if (sortType === 'name-desc') return b.name.localeCompare(a.name);
            if (sortType === 'time-asc') return (a.timestamp || 0) - (b.timestamp || 0);
            return (b.timestamp || 0) - (a.timestamp || 0); // time-desc default
        });

        // 1. Render Main Fine Log Table
        fineArray.forEach((fine) => {
            total += parseFloat(fine.amount);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>#${fine.roll}</strong></td>
                <td>${fine.name}</td>
                <td>${fine.reason}</td>
                <td><strong>${fine.amount} ৳</strong></td>
                <td><span class="time-badge">${formatTimestamp(fine.timestamp)}</span></td>
                <td>
                    <div class="actions">
                        <button class="btn-action btn-edit" data-key="${fine.key}">Edit</button>
                        <button class="btn-action btn-delete" data-key="${fine.key}">Delete</button>
                    </div>
                </td>
            `;
            fineList.appendChild(row);
        });

        totalAmountEl.innerText = total.toLocaleString();

        // 2. Render Per Person Summary Table
        const studentSummary = {};
        Object.values(currentFines).forEach(fine => {
            const rollKey = fine.roll;
            if (!studentSummary[rollKey]) {
                studentSummary[rollKey] = {
                    name: fine.name,
                    roll: fine.roll,
                    count: 0,
                    totalAmount: 0
                };
            }
            studentSummary[rollKey].count += 1;
            studentSummary[rollKey].totalAmount += parseFloat(fine.amount);
        });

        const sortedSummary = Object.values(studentSummary).sort((a, b) => parseInt(a.roll) - parseInt(b.roll));
        sortedSummary.forEach(student => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>#${student.roll}</strong></td>
                <td>${student.name}</td>
                <td>${student.count} times</td>
                <td><strong>${student.totalAmount} ৳</strong></td>
            `;
            personSummaryList.appendChild(row);
        });

        // Event Listeners for Edit/Delete
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', (e) => editFine(e.target.getAttribute('data-key')));
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => deleteFine(e.target.getAttribute('data-key')));
        });
    }

    sortBySelect.addEventListener('change', renderUI);

    // Add or Update Fine Record
    fineForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = studentNameInput.value.trim();
        const roll = rollNoInput.value.trim();
        const reason = reasonInput.value.trim();
        const amount = parseFloat(amountInput.value);
        const editKey = editKeyInput.value;
        const currentTimestamp = Date.now();

        if (editKey === "") {
            push(finesRef, { 
                name, 
                roll, 
                reason, 
                amount,
                timestamp: currentTimestamp 
            });
        } else {
            const itemRef = ref(db, `fines/${editKey}`);
            update(itemRef, { 
                name, 
                roll, 
                reason, 
                amount,
                updatedAt: currentTimestamp 
            });
        }

        resetForm();
    });

    // Protected Edit Function
    function editFine(key) {
        const userPin = prompt("🔒 Enter Admin Password to Edit:");
        if (userPin === null) return;
        
        if (userPin === SECURITY_PIN) {
            const item = currentFines[key];
            studentNameInput.value = item.name;
            rollNoInput.value = item.roll;
            reasonInput.value = item.reason;
            amountInput.value = item.amount;
            editKeyInput.value = key;

            submitBtn.innerText = 'Update Fine Record';
            submitBtn.style.background = '#3182ce';
            cancelBtn.style.display = 'block';
        } else {
            alert("❌ Incorrect Password! You cannot edit this record.");
        }
    }

    // Protected Delete Function
    function deleteFine(key) {
        const userPin = prompt("🔒 Enter Admin Password to Delete:");
        if (userPin === null) return;

        if (userPin === SECURITY_PIN) {
            if (confirm('Are you sure you want to delete this record?')) {
                const itemRef = ref(db, `fines/${key}`);
                remove(itemRef);
                if (editKeyInput.value === key) {
                    resetForm();
                }
            }
        } else {
            alert("❌ Incorrect Password! You cannot delete this record.");
        }
    }

    window.resetForm = function() {
        fineForm.reset();
        editKeyInput.value = "";
        submitBtn.innerText = 'Add Fine Record';
        submitBtn.style.background = '#48bb78';
        cancelBtn.style.display = 'none';
    }

    // Export Excel Functionality
    document.getElementById('btnExcel').addEventListener('click', () => {
        if (!currentFines || Object.keys(currentFines).length === 0) {
            alert("No fine records available to export!");
            return;
        }

        const excelData = Object.values(currentFines).map((fine, index) => ({
            "SL No": index + 1,
            "Roll Number": fine.roll,
            "Student Name": fine.name,
            "Reason": fine.reason,
            "Amount (BDT)": fine.amount,
            "Date & Time": formatTimestamp(fine.timestamp)
        }));

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Fine Records");
        XLSX.writeFile(workbook, "Batch_JEE_CGNT_Fine_Records.xlsx");
    });

    // Export PDF Functionality
    document.getElementById('btnPdf').addEventListener('click', () => {
        if (!currentFines || Object.keys(currentFines).length === 0) {
            alert("No fine records available to download!");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(16);
        doc.text("Batch: JEE/CGNT-A/70/01", 14, 15);
        doc.setFontSize(12);
        doc.text("Class Fine Collection Report", 14, 22);

        const tableColumn = ["Roll", "Student Name", "Reason", "Amount (BDT)", "Date"];
        const tableRows = [];
        let totalAmount = 0;

        Object.values(currentFines).forEach(fine => {
            const fineData = [
                `#${fine.roll}`,
                fine.name,
                fine.reason,
                `${fine.amount} TK`,
                formatTimestamp(fine.timestamp)
            ];
            tableRows.push(fineData);
            totalAmount += parseFloat(fine.amount);
        });

        tableRows.push(["", "", "", "Total Collected:", `${totalAmount} TK`]);

        doc.autoTable({
            head: [tableColumn],
            body: tableRows,
            startY: 28,
            theme: 'striped',
            headStyles: { fillColor: [102, 126, 234] }
        });

        doc.save("Batch_Fine_Report.pdf");
    });
</script>

</body>
</html>
